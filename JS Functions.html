<!DOCTYPE html>
<html lang="en">
<title>Document</title>
<body>  
    <script>
function artistAge() {
    let age = prompt("Enter the age of your favorite artist:");
    age = Number(age);

    if (age < 25) {
        alert("They're " + age + " years old and they're younger than Google.");
    } else if (age === 25) {
        document.write("They're " + age + " and they're as old as Google.");
    } else if (age > 25) {
        alert("They're " + age + " and they're older than Google.");
    } else {
        alert("Please enter a valid number.");
    }

    console.log("The age is: " + age);
}
artistAge();

    </script>
</body>

</html>
